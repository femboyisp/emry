name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  EMRY_MIN_COVERAGE: "90"

jobs:
  rust:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-ubuntu2204"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace --all-features

      - name: Coverage (≥90% lines)
        run: ./scripts/check-coverage.sh

  python:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      # maturin is the build backend, so building/installing the package
      # compiles the native `emry._native` extension — needs the Rust toolchain.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-ubuntu2204"

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (builds the native extension via maturin)
        run: pip install -e ".[dev]"

      - name: Pytest with coverage
        run: pytest

  wheels:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-ubuntu2204"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + abi3 wheel
        run: |
          pip install "maturin>=1.4,<2"
          maturin build --release --out dist
          maturin sdist --out dist

      - name: Verify the wheel installs and imports
        run: |
          python -m venv /tmp/wheeltest
          /tmp/wheeltest/bin/pip install --no-index --find-links dist emry
          /tmp/wheeltest/bin/python -c "import emry, emry._native; print(emry.__version__)"

      - uses: actions/upload-artifact@v4
        with:
          name: emry-dist
          path: dist/*

  pre-commit:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.87"
          components: rustfmt, clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-ubuntu2204"

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run pre-commit
        run: pip install pre-commit && pre-commit run --all-files
