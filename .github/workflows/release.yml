name: Release

# Builds the sdist + manylinux abi3 wheel and publishes to PyPI when a version
# tag is pushed. Publishing uses PyPI Trusted Publishing (OIDC) — no API token
# is stored; the `pypi` environment + `id-token: write` authorize the upload.
#
# To cut a release: bump the version, then `git tag v0.1.0 && git push --tags`.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      # maturin-action builds inside a manylinux container so the abi3 wheel is
      # PyPI-acceptable (a bare `maturin build` would emit a linux_x86_64 wheel
      # that PyPI rejects).
      - name: Build wheel
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto

      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          command: sdist
          args: --out dist

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish:
    needs: build
    runs-on: ubuntu-22.04
    environment: pypi
    permissions:
      id-token: write # OIDC token for Trusted Publishing
      contents: write # create the GitHub Release
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          # Idempotent: skip files already on PyPI (e.g. a re-run after a
          # partial upload) instead of failing the job.
          skip-existing: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: dist/*
